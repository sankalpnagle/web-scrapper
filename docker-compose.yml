services:
  rss2cl:
    build: .
    container_name: rss2cl
    restart: unless-stopped

    volumes:
      - C:/logs/rss2cl:/root/log

    environment:
      # ── Pipeline A (fast) ──────────────────────────────────
      FAST_NUM_WORKERS: "15"
      FAST_BATCH_SIZE: "25"
      FAST_TIMEOUT_MS: "3000"
      FAST_STAGGER_S: "0.5"
      FAST_POST_LOAD_MS: "0"

      # ── Pipeline B (retry) ────────────────────────────────
      RETRY_NUM_WORKERS: "5"
      RETRY_BATCH_SIZE: "10"
      RETRY_TIMEOUT_MS: "25000"
      RETRY_STAGGER_S: "1.0"
      RETRY_PROXY: ""
      RETRY_DECODER_INTERVAL: "0"

      # ── Rate-limit detection (Pipeline B) ─────────────────
      RETRY_RATE_LIMIT_THRESHOLD: "5" # consecutive failures before sleep
      RETRY_RATE_LIMIT_SLEEP_S: "7200" # 2 hours

    healthcheck:
      test:
        - CMD-SHELL
        - >
          supervisorctl -c /etc/supervisor/conf.d/supervisor.conf status
          fast_pipeline retry_pipeline
          | awk '{if($$2!="RUNNING") exit 1}'
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
